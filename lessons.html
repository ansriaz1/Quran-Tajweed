<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arabic Lessons</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Progressive Arabic Lessons</h1>

<h2>Lesson 1 – Letters</h2>
<div class="letters">
<button onclick="play('alif')">ا</button>
<button onclick="play('ba')">ب</button>
<button onclick="play('ta')">ت</button>
<button onclick="play('tha')">ث</button>
</div>

<h2>Lesson 2 – Two Letter Words</h2>
<div class="letters">
<button onclick="play('aba')">اب</button>
<button onclick="play('ata')">ات</button>
</div>

<h2>Lesson 3 – Three Letter Words</h2>
<div class="letters">
<button onclick="play('bata')">بتا</button>
<button onclick="play('tabi')">تبي</button>
</div>

<h2>Lesson 4 – Longer Words</h2>
<div class="letters">
<button onclick="play('kitab')">كتاب</button>
<button onclick="play('iman')">إيمان</button>
</div>

<script src="script.js"></script>
</body>
</html>
