<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Flow - Full Learning System</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fdfbf0; --ink: #1e293b; --green: #065f46; --gold: #b45309; }
        body { background: #d1d5db; font-family: 'Amiri', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { background: #0f172a; color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        
        .menu-scroll { display: flex; overflow-x: auto; gap: 8px; width: 100%; padding: 10px; background: #fff; border-bottom: 2px solid #94a3b8; }
        .tab { background: #f1f5f9; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 5px; white-space: nowrap; cursor: pointer; font-weight: bold; }
        .tab.active { background: var(--green); color: white; }

        .qaida-card { 
            background: var(--paper); width: 95%; max-width: 600px; margin: 20px auto; 
            border: 5px double var(--ink); padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }

        /* Joining Logic: No Space */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border: 1px solid var(--ink); }
        .box { 
            aspect-ratio: 1.5/1; display: flex; justify-content: center; align-items: center; 
            font-size: 2.5rem; border: 1px solid var(--ink); cursor: pointer; 
            letter-spacing: -2px; /* Pulls letters together */
        }
        .box:active { background: #fef3c7; }

        .surah-text { font-size: 2rem; line-height: 2.5; text-align: center; padding: 20px; color: var(--ink); }
        .ayah { cursor: pointer; display: inline-block; padding: 0 5px; transition: 0.2s; }
        .ayah:hover { color: var(--gold); background: #fef3c7; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Noorani Qaida & Surah Master</h2>
    <div id="status" style="font-size: 0.8rem; color: #10b981;">Audio Engine: Ready</div>
</div>

<div class="menu-scroll" id="tabs">
    <button class="tab active" onclick="loadLesson('alphabet')">Alphabet</button>
    <button class="tab" onclick="loadLesson('joining_2')">2-Letter Join</button>
    <button class="tab" onclick="loadLesson('joining_3')">3-Letter Join</button>
    <button class="tab" onclick="loadLesson('surahs')">Short Surahs</button>
</div>

<div class="qaida-card" id="content-area">
    <div class="grid" id="main-grid"></div>
</div>

<script>
    const curriculum = {
        alphabet: ['أ', 'ب', 'ت', 'ث', 'ج', 'ح', 'خ', 'د', 'ذ', 'ر', 'ز', 'س', 'ش', 'ص', 'ض', 'ط', 'ظ', 'ع', 'غ', 'ف', 'ق', 'ك', 'ل', 'م', 'ن', 'و', 'ه', 'ي'],
        joining_2: ['بَتَ', 'بَثَ', 'تَبَ', 'نَتَ', 'يَبَ', 'سَيَ', 'قَلَ', 'كَمَ', 'لَمَ', 'يَدَ', 'هَذَا', 'قُلْ'],
        joining_3: ['خَلَقَ', 'نَصَرَ', 'كَتَبَ', 'عَلِمَ', 'حَسِبَ', 'قُتِلَ', 'سُئِلَ', 'ذُكِرَ', 'يَذْهَبُ', 'يَعْلَمُ'],
        surahs: [
            { name: "Al-Fatihah", id: 1 }, { name: "Al-Ikhlas", id: 112 }, { name: "Al-Falaq", id: 113 }, 
            { name: "An-Nas", id: 114 }, { name: "Al-Kawthar", id: 108 }, { name: "Al-Asr", id: 103 },
            { name: "An-Nasr", id: 110 }, { name: "Al-Fil", id: 105 }
        ]
    };

    let audioPlayer = new Audio();

    function loadLesson(type) {
        const grid = document.getElementById('main-grid');
        const content = document.getElementById('content-area');
        grid.innerHTML = '';
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        if (type === 'surahs') {
            grid.style.display = 'none';
            content.innerHTML = `<div id="surah-list"></div><div id="surah-view" class="surah-text"></div>`;
            curriculum.surahs.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'tab';
                btn.style.margin = '5px';
                btn.innerText = s.name;
                btn.onclick = () => fetchSurah(s.id);
                document.getElementById('surah-list').appendChild(btn);
            });
        } else {
            grid.style.display = 'grid';
            content.innerHTML = ''; 
            content.appendChild(grid);
            curriculum[type].forEach(text => {
                const box = document.createElement('div');
                box.className = 'box';
                box.innerText = text;
                box.onclick = () => playSound(text);
                grid.appendChild(box);
            });
        }
    }

    // Audio System: Uses a mix of API and Speech for 100% reliability
    function playSound(text) {
        // Cancel any current speech
        window.speechSynthesis.cancel();
        
        const msg = new SpeechSynthesisUtterance();
        msg.lang = 'ar-SA';
        msg.text = text;
        msg.rate = 0.6;
        window.speechSynthesis.speak(msg);
        
        document.getElementById('status').innerText = "🔊 Playing: " + text;
    }

    async function fetchSurah(id) {
        const view = document.getElementById('surah-view');
        view.innerHTML = "⌛ Loading Surah...";
        try {
            const res = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`);
            const data = await res.json();
            view.innerHTML = "";
            data.verses.forEach((v, index) => {
                const span = document.createElement('span');
                span.className = 'ayah';
                span.innerText = v.text_uthmani + ` (${index + 1}) `;
                span.onclick = () => playSurahAudio(id, index + 1);
                view.appendChild(span);
            });
        } catch (e) { view.innerText = "Connection Error. Try again."; }
    }

    function playSurahAudio(chapter, verse) {
        audioPlayer.src = `https://audio.quran.com/v2/mishari_alafasy/${chapter}/${verse}.mp3`;
        audioPlayer.play();
        document.getElementById('status').innerText = "📖 Reciting...";
    }

    loadLesson('alphabet');
</script>
</body>
</html>
