<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Tajweed Master - Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fefcf3; --ink: #1e293b; --green: #065f46; --gold: #b45309; --qalqalah: #3b82f6; --ghunna: #8b5cf6; }
        body { background: #cbd5e1; font-family: 'Amiri', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { background: #0f172a; color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 4px solid var(--gold); }
        
        .nav-scroll { display: flex; overflow-x: auto; gap: 8px; width: 100%; padding: 15px; background: #fff; border-bottom: 2px solid #94a3b8; }
        .l-tab { background: #f1f5f9; border: 1px solid #94a3b8; padding: 10px 18px; border-radius: 5px; white-space: nowrap; cursor: pointer; font-weight: bold; }
        .l-tab.active { background: var(--green); color: white; }

        .qaida-page { 
            background: var(--paper); width: 95%; max-width: 600px; margin: 20px; 
            border: 8px double var(--ink); padding: 20px; border-radius: 5px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
        }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .word-box { 
            background: white; border: 2px solid var(--ink); padding: 25px; border-radius: 12px;
            text-align: center; font-size: 3.5rem; cursor: pointer; transition: 0.2s; position: relative;
        }
        .word-box:active { background: #fef3c7; }

        .rule-tag { position: absolute; top: 5px; left: 5px; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-family: sans-serif; color: white; text-transform: uppercase; }
        .tag-qal { background: var(--qalqalah); }
        .tag-ghu { background: var(--ghunna); }
        
        .instruction-box { background: #fffbeb; border: 1px solid #f59e0b; padding: 15px; margin: 10px; border-radius: 8px; font-size: 0.95rem; color: #92400e; text-align: center; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Complete Tajweed Encyclopedia</h2>
    <p style="margin:5px 0 0; font-size: 0.8rem; color: #34d399;">Spelling + Tajweed Rules Active</p>
</div>

<div class="nav-scroll" id="lesson-bar"></div>

<div class="instruction-box" id="rule-info">Loading Tajweed Rules...</div>

<div class="qaida-page">
    <div class="grid" id="main-grid"></div>
</div>

<script>
    const curriculum = {
        1: { title: "The Alphabet (Makharij)", info: "Pronounce from the correct part of the throat/mouth.", data: [
            { w: 'أ', h: ["Alif"], r: "" }, { w: 'ب', h: ["Baa"], r: "" }, { w: 'ح', h: ["Haa - Middle Throat"], r: "" }, { w: 'خ', h: ["Khaa - Top Throat (Heavy)"], r: "" }
        ]},
        10: { title: "Qalqalah (Bouncing Sounds)", info: "Letters [ق ط ب ج د] must bounce when they have a Sukoon.", data: [
            { w: 'أَبْ', h: ["Alif zabar Baa Ab... (Bounce the Baa)"], r: "qal" },
            { w: 'أَجْ', h: ["Alif zabar Jim Aj... (Bounce the Jim)"], r: "qal" }
        ]},
        15: { title: "Ghunna (Nasal Sound)", info: "Noon and Meem with Shaddah must be held in the nose for 2 counts.", data: [
            { w: 'إِنَّ', h: ["Alif zer Noon In... (Hold the Ghunna)", "Noon zabar Naa", "In-na"], r: "ghu" },
            { w: 'ثُمَّ', h: ["Thaa pesh Meem Thum... (Hold the Ghunna)", "Meem zabar Maa", "Thum-ma"], r: "ghu" }
        ]},
        20: { title: "Madd (Stretching Rules)", info: "Stretch for 2, 4, or 6 counts depending on the symbol.", data: [
            { w: 'بَا', h: ["Baa zabar Alif Baaa (2 counts)"], r: "" },
            { w: 'جَآءَ', h: ["Jim zabar Alif Jaaa (Stretch 4 counts)", "Hamza zabar Aa", "Jaaa-aa"], r: "" }
        ]},
        30: { title: "Surah Al-Ikhlas (Full Tajweed)", info: "Applying all rules in recitation.", data: [
            { w: 'قُلْ هُوَ اللَّهُ أَحَدٌ', h: ["Qaaf pesh Laam Qul (Heavy Qaaf)", "Haa pesh Hu", "Wao zabar Wa", "Huwa", "Allah (Heavy Name)", "Ahad (Bounce the Daal)"], r: "qal" }
        ]
    };

    // Populate all 30 lesson tabs
    function init() {
        const bar = document.getElementById('lesson-bar');
        for(let i=1; i<=30; i++) {
            const btn = document.createElement('button');
            btn.className = `l-tab ${i===1?'active':''}`;
            btn.innerText = curriculum[i] ? curriculum[i].title.split(':')[0] : `Lesson ${i}`;
            btn.onclick = (e) => loadLesson(i, e.target);
            bar.appendChild(btn);
        }
        loadLesson(1, document.querySelector('.l-tab'));
    }

    function loadLesson(num, btn) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        const lesson = curriculum[num] || { title: `Lesson ${num}`, info: "Continuous Practice", data: [] };
        
        document.getElementById('rule-info').innerText = lesson.info;
        document.querySelectorAll('.l-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');

        lesson.data.forEach(item => {
            const box = document.createElement('div');
            box.className = 'word-box';
            let tag = item.r ? `<span class="rule-tag tag-${item.r}">${item.r === 'qal' ? 'Qalqalah' : 'Ghunna'}</span>` : '';
            box.innerHTML = `${tag}${item.w}`;
            box.onclick = () => runTutor(item.h, box);
            grid.appendChild(box);
        });
    }

    async function runTutor(steps, element) {
        window.speechSynthesis.cancel();
        element.style.borderColor = "#b45309";
        
        for (let step of steps) {
            await speak(step);
            await new Promise(r => setTimeout(r, 600));
        }
        element.style.borderColor = "#1e293b";
    }

    function speak(text) {
        return new Promise(resolve => {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; 
            msg.rate = 0.75; // Slower for clarity
            msg.onend = resolve;
            window.speechSynthesis.speak(msg);
        });
    }

    init();
</script>
</body>
  </html>
