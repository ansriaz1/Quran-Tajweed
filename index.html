<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noorani Tajweed Master</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fefcf3; --ink: #1e293b; --green: #065f46; --gold: #b45309; --qalqalah: #3b82f6; --ghunna: #8b5cf6; }
        body { background: #cbd5e1; font-family: 'Amiri', serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .header { background: #0f172a; color: white; width: 100%; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); }
        
        .mode-selector { background: white; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 10px; border-bottom: 2px solid #94a3b8; }
        .m-btn { padding: 10px 20px; border-radius: 25px; border: 2px solid #cbd5e1; cursor: pointer; font-weight: bold; font-family: sans-serif; transition: 0.3s; }
        .m-btn.active { background: var(--gold); color: white; border-color: var(--gold); }

        .lesson-nav { display: flex; overflow-x: auto; gap: 8px; width: 100%; padding: 15px; background: #fff; border-bottom: 2px solid #94a3b8; scrollbar-width: thin; }
        .l-tab { background: #f1f5f9; border: 1px solid #94a3b8; padding: 10px 18px; border-radius: 5px; white-space: nowrap; cursor: pointer; font-weight: bold; }
        .l-tab.active { background: var(--green); color: white; }

        .instruction-box { background: #fffbeb; border: 1px solid #f59e0b; padding: 15px; margin: 15px; border-radius: 8px; width: 90%; max-width: 500px; font-size: 0.95rem; color: #92400e; text-align: center; font-family: sans-serif; }

        .qaida-page { background: var(--paper); width: 95%; max-width: 600px; margin-bottom: 30px; border: 8px double var(--ink); padding: 20px; border-radius: 5px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .word-box { background: white; border: 2px solid var(--ink); padding: 25px; border-radius: 12px; text-align: center; font-size: 3.5rem; cursor: pointer; position: relative; }
        .word-box:active { background: #fef3c7; }

        .rule-tag { position: absolute; top: 5px; left: 5px; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-family: sans-serif; color: white; }
        .tag-qal { background: var(--qalqalah); }
        .tag-ghu { background: var(--ghunna); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">Complete Tajweed Encyclopedia</h2>
    <p style="margin:5px 0 0; font-size: 0.8rem; color: #34d399;">Spelling + Tajweed Rules Active</p>
</div>

<div class="mode-selector">
    <button id="hijja" class="m-btn active" onclick="setMode('hijja')">Method 1: Hijja (Spelling)</button>
    <button id="fluency" class="m-btn" onclick="setMode('fluency')">Method 2: Word (Fluency)</button>
</div>

<div class="lesson-nav" id="lesson-bar"></div>

<div class="instruction-box" id="rule-info">Select a lesson to begin learning...</div>

<div class="qaida-page">
    <div class="grid" id="main-grid"></div>
</div>

<script>
    let currentMode = 'hijja';
    
    const curriculum = {
        1: { title: "Alphabet Foundations", info: "Focus on Makhraj (where the sound starts).", data: [
            { w: 'أ', h: ["Alif"], f: "Alif" }, { w: 'ب', h: ["Baa"], f: "Baa" }, { w: 'ح', h: ["Haa - Middle Throat"], f: "Haa" }, { w: 'خ', h: ["Khaa - Top Throat"], f: "Khaa" }
        ]},
        10: { title: "Qalqalah (Bouncing)", info: "Bounce letters [ق ط ب ج د] when they have Sukoon.", data: [
            { w: 'أَبْ', h: ["Alif zabar Baa Ab... Bounce it"], f: "Ab", r: "qal" },
            { w: 'أَجْ', h: ["Alif zabar Jim Aj... Bounce it"], f: "Aj", r: "qal" }
        ]},
        20: { title: "Madd (Stretching)", info: "Stretch for 2, 4, or 6 counts.", data: [
            { w: 'بَا', h: ["Baa zabar Alif Baaa"], f: "Baaaa" },
            { w: 'جَآءَ', h: ["Jim zabar Alif Jaaa", "Hamza zabar Aa", "Jaaa-aa"], f: "Jaaa-aa" }
        ]},
        30: { title: "Surah Al-Ikhlas", info: "Full Hijja spelling and Tajweed application.", data: [
            { w: 'قُلْ هُوَ اللَّهُ أَحَدٌ', h: ["Qaaf pesh Laam Qul", "Haa pesh Hu", "Wao zabar Wa", "Huwa", "Allah", "Aha", "Daal do-pesh Dun... Bounce the Daal"], f: "Qul Huwallahu Ahad", r: "qal" }
        ]
    };

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode).classList.add('active');
    }

    function loadLesson(num, btn) {
        const grid = document.getElementById('main-grid');
        const lesson = curriculum[num] || { title: `Lesson ${num}`, info: "Practice session.", data: [{w:'قُرْآنٌ', h:["Qaaf pesh Ra Qur","Alif do-zabar Aan","Quranun"], f:"Quranun"}] };
        
        grid.innerHTML = '';
        document.getElementById('rule-info').innerText = lesson.info;
        document.querySelectorAll('.l-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');

        lesson.data.forEach(item => {
            const box = document.createElement('div');
            box.className = 'word-box';
            let tag = item.r ? `<span class="rule-tag tag-${item.r}">${item.r === 'qal' ? 'Qalqalah' : 'Ghunna'}</span>` : '';
            box.innerHTML = `${tag}${item.w}`;
            box.onclick = () => runTutor(item, box);
            grid.appendChild(box);
        });
    }

    async function runTutor(item, element) {
        window.speechSynthesis.cancel();
        element.style.borderColor = "#b45309";
        
        if (currentMode === 'hijja') {
            for (let step of item.h) {
                await speak(step, 0.75);
                await new Promise(r => setTimeout(r, 600));
            }
        } else {
            await speak(item.f, 0.6);
        }
        element.style.borderColor = "#1e293b";
    }

    function speak(text, rate) {
        return new Promise(resolve => {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; 
            msg.rate = rate;
            msg.onend = resolve;
            window.speechSynthesis.speak(msg);
        });
    }

    window.onload = () => {
        const bar = document.getElementById('lesson-bar');
        for(let i=1; i<=30; i++) {
            const btn = document.createElement('button');
            btn.className = `l-tab ${i===1?'active':''}`;
            btn.innerText = `Lesson ${i}`;
            btn.onclick = (e) => loadLesson(i, e.target);
            bar.appendChild(btn);
        }
        loadLesson(1, bar.firstChild);
    };
</script>
</body>
</html>
