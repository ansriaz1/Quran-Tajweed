<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Quran Master - All-in-One</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --paper: #fefcf3; --ink: #1e293b; --green: #065f46; --gold: #b45309; }
        body { background: #f1f5f9; font-family: 'Amiri', serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .top-nav { background: #0f172a; color: white; width: 100%; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        /* Search Bar */
        .search-box { width: 85%; max-width: 400px; padding: 10px; margin: 15px auto; border-radius: 25px; border: 2px solid var(--ink); text-align: center; font-size: 1rem; }

        .lesson-menu { display: flex; overflow-x: auto; gap: 8px; width: 100%; padding: 10px; background: #fff; border-bottom: 2px solid #cbd5e1; }
        .tab { background: #f8fafc; border: 1px solid #94a3b8; padding: 8px 15px; border-radius: 8px; white-space: nowrap; cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: var(--green); color: white; border-color: var(--green); }

        .qaida-page { 
            background: var(--paper); width: 95%; max-width: 500px; margin: 20px; 
            border: 5px solid var(--gold); padding: 5px; border-radius: 8px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); border: 1px solid var(--ink); }
        .box { 
            aspect-ratio: 1.1/1; display: flex; flex-direction: column; justify-content: center; 
            align-items: center; font-size: 2.2rem; border: 1px solid var(--ink); 
            cursor: pointer; transition: 0.1s; position: relative;
        }
        .box:active { background: #fef3c7; }
        .box small { font-size: 0.7rem; color: #64748b; font-family: sans-serif; position: absolute; bottom: 5px; }

        .highlight { background: #fde68a !important; border: 3px solid var(--gold) !important; z-index: 5; }

        .tajweed-rule { background: #ecfdf5; border-right: 5px solid var(--green); padding: 12px; margin: 10px; border-radius: 4px; font-size: 1rem; color: #064e3b; }
    </style>
</head>
<body>

<div class="top-nav">
    <h2 style="margin:0">Complete Tajweed Master</h2>
    <div style="font-size: 0.8rem; opacity: 0.8;">Tap any box to learn the sound</div>
</div>

<input type="text" id="search" class="search-box" placeholder="Search (e.g. 'Ba' or 'B')" onkeyup="searchLetters()">

<div class="lesson-menu" id="menu">
    </div>

<div class="tajweed-rule" id="rule-desc">Lesson 1: Learn the names of individual letters.</div>

<div class="qaida-page">
    <div class="grid" id="main-grid"></div>
</div>

<script>
    const curriculum = {
        "1. Alphabet": { desc: "Naming letters (Makhraj)", data: [
            {t: 'أ', e: 'Alif'}, {t: 'ب', e: 'Ba'}, {t: 'ت', e: 'Ta'}, {t: 'ث', e: 'Tha'}, {t: 'ج', e: 'Jim'}, {t: 'ح', e: 'Ha'}
        ]},
        "2. Harakat": { desc: "Short Vowels: Fatha, Kasra, Damma", data: [
            {t: 'أَ', e: 'A'}, {t: 'إِ', e: 'I'}, {t: 'أُ', e: 'U'}, {t: 'بَ', e: 'Ba'}, {t: 'بِ', e: 'Bi'}, {t: 'بُ', e: 'Bu'}
        ]},
        "3. Tanween": { desc: "Double Vowels (Nunation)", data: [
            {t: 'أً', e: 'An'}, {t: 'أٍ', e: 'In'}, {t: 'أٌ', e: 'Un'}, {t: 'بً', e: 'Ban'}, {t: 'بٍ', e: 'Bin'}, {t: 'بٌ', e: 'Bun'}
        ]},
        "4. Joining": { desc: "Connecting letters shapes", data: [
            {t: 'بـ ـبـ ـب', e: 'Ba shapes'}, {t: 'تـ ـتـ ـت', e: 'Ta shapes'}, {t: 'يـ ـيـ ـي', e: 'Ya shapes'}
        ]},
        "5. Madd": { desc: "Long Vowels (Stretch sound)", data: [
            {t: 'بَا', e: 'Baaa'}, {t: 'بِي', e: 'Beee'}, {t: 'بُو', e: 'Booo'}
        ]},
        "6. Sukoon": { desc: "Stopping/Connecting sounds", data: [
            {t: 'أَبْ', e: 'Ab'}, {t: 'أَتْ', e: 'At'}, {t: 'أَثْ', e: 'Ath'}, {t: 'أَجْ', e: 'Aj'}
        ]},
        "7. Shaddah": { desc: "Emphasis/Double sound", data: [
            {t: 'أَبَّ', e: 'Abba'}, {t: 'أَبِّ', e: 'Abbi'}, {t: 'أَبُّ', e: 'Abbu'}
        ]}
    };

    function init() {
        const menu = document.getElementById('menu');
        Object.keys(curriculum).forEach((lesson, i) => {
            const btn = document.createElement('button');
            btn.className = `tab ${i===0?'active':''}`;
            btn.innerText = lesson;
            btn.onclick = (e) => loadLesson(lesson, e.target);
            menu.appendChild(btn);
        });
        loadLesson("1. Alphabet", document.querySelector('.tab'));
    }

    function loadLesson(key, btn) {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        document.getElementById('rule-desc').innerText = curriculum[key].desc;
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');

        curriculum[key].data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'box';
            div.setAttribute('data-english', item.e.toLowerCase());
            div.innerHTML = `${item.t}<small>${item.e}</small>`;
            div.onclick = () => speak(item.t);
            grid.appendChild(div);
        });
    }

    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.lang = 'ar-SA';
        msg.text = text;
        msg.rate = 0.55; 
        window.speechSynthesis.speak(msg);
    }

    function searchLetters() {
        const query = document.getElementById('search').value.toLowerCase();
        document.querySelectorAll('.box').forEach(box => {
            const eng = box.getAttribute('data-english');
            if(query !== "" && eng.includes(query)) {
                box.classList.add('highlight');
            } else {
                box.classList.remove('highlight');
            }
        });
    }

    init();
</script>
</body>
</html>
